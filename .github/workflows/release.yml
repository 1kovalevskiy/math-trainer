name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare version
        id: version
        run: |
          tag_version="$(date -u +'%Y-%m-%d-%H%M')"
          release_name_date="$(date -u +'%Y-%m-%d')"
          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "release_name_date=$release_name_date" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            os="$1"
            arch="$2"
            ext="$3"
            output="dist/math-trainer-${{ steps.version.outputs.tag_version }}-${os}-${arch}${ext}"
            echo "Building $output"

            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "$output" \
              ./cmd
          }

          build linux amd64 ""
          build linux arm64 ""
          build darwin amd64 ""
          build darwin arm64 ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.version.outputs.tag_version }}
          name: Math trainer ${{ steps.version.outputs.release_name_date }}
          target_commitish: main
          fail_on_unmatched_files: true
          files: dist/*